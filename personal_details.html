<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "outline": "#6e7b6c",
                      "on-tertiary-fixed": "#3f0016",
                      "surface-dim": "#d8dadc",
                      "on-primary-fixed": "#002109",
                      "surface-container-high": "#e6e8ea",
                      "secondary-fixed-dim": "#a1d3a4",
                      "tertiary-fixed": "#ffd9de",
                      "tertiary-container": "#c74668",
                      "surface-container-lowest": "#ffffff",
                      "inverse-surface": "#2d3133",
                      "inverse-on-surface": "#eff1f3",
                      "surface-container": "#eceef0",
                      "inverse-primary": "#62df7d",
                      "error": "#ba1a1a",
                      "background": "#f7f9fb",
                      "surface-container-highest": "#e0e3e5",
                      "primary-container": "#00873a",
                      "on-secondary-fixed-variant": "#23502c",
                      "on-secondary-container": "#406c46",
                      "on-surface": "#191c1e",
                      "primary-fixed": "#7ffc97",
                      "on-secondary": "#ffffff",
                      "on-primary-fixed-variant": "#005320",
                      "surface": "#f7f9fb",
                      "error-container": "#ffdad6",
                      "surface-bright": "#f7f9fb",
                      "outline-variant": "#bdcaba",
                      "on-primary": "#ffffff",
                      "on-surface-variant": "#3e4a3d",
                      "tertiary-fixed-dim": "#ffb2bf",
                      "secondary": "#3b6842",
                      "primary": "#006b2c",
                      "on-background": "#191c1e",
                      "surface-container-low": "#f2f4f6",
                      "surface-variant": "#e0e3e5",
                      "on-primary-container": "#f7fff2",
                      "on-secondary-fixed": "#002109",
                      "on-error": "#ffffff",
                      "primary-fixed-dim": "#62df7d",
                      "secondary-container": "#baecbc",
                      "on-tertiary-fixed-variant": "#8a143c",
                      "surface-tint": "#006e2d",
                      "secondary-fixed": "#bdefbe",
                      "on-tertiary-container": "#fffbff",
                      "on-error-container": "#93000a",
                      "tertiary": "#a72d51",
                      "on-tertiary": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center">
<!-- TopAppBar - Updated to match Login screens -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-lg flex items-center justify-between px-6 h-16 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-headline text-xl font-extrabold tracking-tighter text-primary">
            Concierge
        </div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 w-full max-w-md px-6 pt-32 pb-12 flex flex-col justify-between">
<!-- Content Section -->
<section class="flex flex-col gap-12">
<div class="flex flex-col gap-2">
<span class="text-primary font-bold tracking-widest text-xs uppercase opacity-80">Personal Details</span>
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface leading-tight">
                    What’s your name?
                </h2>
</div>
<div class="relative group">
<div class="relative flex flex-col gap-2">
<label class="ml-1 text-sm font-semibold text-on-surface-variant/80 uppercase tracking-wider" for="full_name">Full Name</label>
<input class="w-full h-16 px-6 rounded-DEFAULT bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/40 focus:outline-none text-on-surface text-lg font-medium transition-all shadow-sm" id="full_name" placeholder="Enter your full name" type="text"/>
<p class="ml-1 text-xs text-on-surface-variant/60 font-body">
                        You can change this later in your profile settings.
                    </p>
</div>
</div>
</section>
<!-- Primary Action -->
<div class="mt-auto pt-12">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-full shadow-[0_8px_20px_rgba(0,107,44,0.25)] active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2 group">
                Continue
                <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</main>
<!-- Visual Background Element (Asymmetric) -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed top-1/2 -right-32 w-80 h-80 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Progress Indicator Detail (Subtle line) -->
<div class="fixed bottom-0 left-0 w-full h-[4px] bg-surface-container">
<div class="h-full bg-primary w-full rounded-full"></div>
</div>
</body></html>
